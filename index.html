<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素机甲对战 - Pixel Mech Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" width="960" height="540"></canvas>
            
            <div id="mainMenu" class="overlay menu-overlay">
                <div class="menu-content">
                    <h1 class="game-title pixel-text">
                        <span class="title-line1">像素</span>
                        <span class="title-line2">机甲对战</span>
                    </h1>
                    <p class="subtitle pixel-text">PIXEL MECH BATTLE</p>
                    
                    <div class="controls-info">
                        <div class="control-panel p1-panel">
                            <h3 class="pixel-text">玩家 1 (蓝色)</h3>
                            <div class="control-row"><span class="key">W</span><span class="action">跳跃</span></div>
                            <div class="control-row"><span class="key">A</span><span class="action">左移</span></div>
                            <div class="control-row"><span class="key">D</span><span class="action">右移</span></div>
                            <div class="control-row"><span class="key">J</span><span class="action">攻击</span></div>
                            <div class="control-row"><span class="key">K</span><span class="action">防御</span></div>
                        </div>
                        
                        <div class="vs-badge pixel-text">VS</div>
                        
                        <div class="control-panel p2-panel">
                            <h3 class="pixel-text">玩家 2 (红色)</h3>
                            <div class="control-row"><span class="key">↑</span><span class="action">跳跃</span></div>
                            <div class="control-row"><span class="key">←</span><span class="action">左移</span></div>
                            <div class="control-row"><span class="key">→</span><span class="action">右移</span></div>
                            <div class="control-row"><span class="key">1</span><span class="action">攻击</span></div>
                            <div class="control-row"><span class="key">2</span><span class="action">防御</span></div>
                        </div>
                    </div>
                    
                    <p class="start-hint pixel-text blink">按 空格键 开始游戏</p>
                </div>
            </div>
            
            <div id="gameOver" class="overlay gameover-overlay hidden">
                <div class="gameover-content">
                    <h2 id="winnerText" class="pixel-text winner-text">玩家 1 胜利!</h2>
                    <div class="trophy">🏆</div>
                    <p class="restart-hint pixel-text blink">按 空格键 重新开始</p>
                    <p class="menu-hint pixel-text">按 ESC 返回菜单</p>
                </div>
            </div>
            
            <div id="hud" class="hud hidden">
                <div class="health-bar-container p1-health-container">
                    <div class="player-label pixel-text">P1</div>
                    <div class="health-bar-outer">
                        <div id="p1Health" class="health-bar p1-health"></div>
                    </div>
                </div>
                
                <div class="timer pixel-text" id="timer">99</div>
                
                <div class="health-bar-container p2-health-container">
                    <div class="player-label pixel-text">P2</div>
                    <div class="health-bar-outer">
                        <div id="p2Health" class="health-bar p2-health"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
