<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素机甲对战 - 联网模式</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="online.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" width="960" height="540"></canvas>
            
            <!-- 联网模式菜单 -->
            <div id="onlineMenu" class="overlay menu-overlay">
                <div class="menu-content">
                    <h1 class="game-title pixel-text">
                        <span class="title-line1">像素</span>
                        <span class="title-line2">机甲对战</span>
                    </h1>
                    <p class="subtitle pixel-text">联网对战模式</p>
                    
                    <div class="online-options">
                        <div class="option-card" id="quickMatchCard">
                            <div class="option-icon">⚡</div>
                            <h3 class="pixel-text">快速匹配</h3>
                            <p class="option-desc">自动匹配在线玩家</p>
                            <button class="pixel-btn" id="quickMatchBtn">开始匹配</button>
                        </div>
                        
                        <div class="option-card" id="createRoomCard">
                            <div class="option-icon">🏠</div>
                            <h3 class="pixel-text">创建房间</h3>
                            <p class="option-desc">创建房间邀请好友</p>
                            <button class="pixel-btn" id="createRoomBtn">创建房间</button>
                        </div>
                        
                        <div class="option-card" id="joinRoomCard">
                            <div class="option-icon">🚪</div>
                            <h3 class="pixel-text">加入房间</h3>
                            <p class="option-desc">输入房间码加入</p>
                            <div class="room-input-wrapper">
                                <input type="text" id="roomCodeInput" class="pixel-input" 
                                       placeholder="输入房间码" maxlength="4" autocomplete="off">
                            </div>
                            <button class="pixel-btn" id="joinRoomBtn">加入房间</button>
                        </div>
                    </div>
                    
                    <div class="server-status">
                        <span id="serverStatus" class="status-indicator disconnected">服务器: 未连接</span>
                        <input type="text" id="serverAddressInput" class="pixel-input small" 
                               placeholder="服务器地址" value="">
                        <button class="pixel-btn small" id="connectServerBtn">连接</button>
                    </div>
                    
                    <a href="index.html" class="back-link pixel-text">← 返回本地对战</a>
                </div>
            </div>
            
            <!-- 等待匹配界面 -->
            <div id="waitingMatch" class="overlay hidden">
                <div class="waiting-content">
                    <div class="spinner"></div>
                    <h2 class="pixel-text waiting-text">等待匹配中...</h2>
                    <p class="pixel-text room-code-display">房间码: <span id="waitingRoomCode"></span></p>
                    <button class="pixel-btn cancel-btn" id="cancelWaitBtn">取消</button>
                </div>
            </div>
            
            <!-- 房间等待界面 -->
            <div id="roomWaiting" class="overlay hidden">
                <div class="waiting-content">
                    <h2 class="pixel-text waiting-text">等待对手加入</h2>
                    <p class="pixel-text room-code-display">房间码: <span id="hostRoomCode"></span></p>
                    <p class="pixel-text hint-text">分享房间码给好友</p>
                    <div class="player-status">
                        <div class="player-box p1-box">
                            <span class="pixel-text">P1 (你)</span>
                            <span class="ready-badge pixel-text ready">就绪</span>
                        </div>
                        <div class="player-box p2-box" id="p2StatusBox">
                            <span class="pixel-text">P2 (对手)</span>
                            <span class="ready-badge pixel-text waiting">等待...</span>
                        </div>
                    </div>
                    <button class="pixel-btn cancel-btn" id="cancelRoomBtn">取消房间</button>
                </div>
            </div>
            
            <!-- 游戏开始界面 -->
            <div id="gameReady" class="overlay hidden">
                <div class="ready-content">
                    <h2 class="pixel-text">对手已连接!</h2>
                    <p class="pixel-text vs-text">VS</p>
                    <div class="player-ready-status">
                        <div class="player-side">
                            <span class="pixel-text" id="mySideLabel">你 (P1)</span>
                            <div class="mech-preview p1-mech"></div>
                        </div>
                        <div class="player-side">
                            <span class="pixel-text" id="opponentSideLabel">对手 (P2)</span>
                            <div class="mech-preview p2-mech"></div>
                        </div>
                    </div>
                    <p class="pixel-text blink">按 空格键 表示就绪</p>
                </div>
            </div>
            
            <!-- 游戏结束界面 -->
            <div id="gameOver" class="overlay gameover-overlay hidden">
                <div class="gameover-content">
                    <h2 id="winnerText" class="pixel-text winner-text">胜利!</h2>
                    <div class="trophy">🏆</div>
                    <p class="restart-hint pixel-text blink">按 空格键 重新开始</p>
                    <p class="menu-hint pixel-text">按 ESC 返回菜单</p>
                </div>
            </div>
            
            <!-- 对手离开提示 -->
            <div id="opponentLeft" class="overlay hidden">
                <div class="left-content">
                    <h2 class="pixel-text">对手离开了游戏</h2>
                    <button class="pixel-btn" id="backToMenuBtn">返回菜单</button>
                </div>
            </div>
            
            <!-- HUD -->
            <div id="hud" class="hud hidden">
                <div class="health-bar-container p1-health-container">
                    <div class="player-label pixel-text" id="p1Label">P1</div>
                    <div class="health-bar-outer">
                        <div id="p1Health" class="health-bar p1-health"></div>
                    </div>
                </div>
                
                <div class="timer pixel-text" id="timer">99</div>
                
                <div class="health-bar-container p2-health-container">
                    <div class="player-label pixel-text" id="p2Label">P2</div>
                    <div class="health-bar-outer">
                        <div id="p2Health" class="health-bar p2-health"></div>
                    </div>
                </div>
                
                <div class="connection-status" id="connectionStatus">
                    <span class="ping pixel-text" id="pingDisplay">延迟: --ms</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="online.js"></script>
</body>
</html>
